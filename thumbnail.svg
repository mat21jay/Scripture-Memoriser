<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060E1C"/>
      <stop offset="55%" style="stop-color:#0F1C2E"/>
      <stop offset="100%" style="stop-color:#1A2D44"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A07020"/>
      <stop offset="45%" style="stop-color:#E8BE60"/>
      <stop offset="100%" style="stop-color:#A07020"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFDF5"/>
      <stop offset="100%" style="stop-color:#F5E8C8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Diagonal light rays -->
  <line x1="0" y1="630" x2="700" y2="0"   stroke="#C9922A" stroke-width="0.6" opacity="0.07"/>
  <line x1="180" y1="630" x2="880" y2="0" stroke="#C9922A" stroke-width="0.6" opacity="0.07"/>
  <line x1="360" y1="630" x2="1060" y2="0" stroke="#C9922A" stroke-width="0.6" opacity="0.07"/>
  <line x1="520" y1="630" x2="1200" y2="60" stroke="#C9922A" stroke-width="0.6" opacity="0.07"/>

  <!-- Ambient glow left -->
  <ellipse cx="240" cy="310" rx="220" ry="240" fill="#C9922A" opacity="0.035" filter="url(#glow)"/>

  <!-- ── LEFT PANEL ── -->

  <!-- Cross -->
  <rect x="188" y="130" width="9" height="66" rx="4.5" fill="url(#gold)" opacity="0.9"/>
  <rect x="165" y="151" width="54" height="9" rx="4.5" fill="url(#gold)" opacity="0.9"/>

  <!-- Star ornament -->
  <text x="238" y="128" text-anchor="middle" font-family="Georgia" font-size="18" fill="#E8BE60" opacity="0.6">✦</text>

  <!-- App name -->
  <text x="238" y="240"
    font-family="'Palatino Linotype',Palatino,Georgia,serif"
    font-size="50" font-weight="700" fill="url(#gold)" text-anchor="middle">Scripture</text>
  <text x="238" y="295"
    font-family="'Palatino Linotype',Palatino,Georgia,serif"
    font-size="50" font-weight="700" fill="url(#gold)" text-anchor="middle">Memoriser</text>

  <!-- Rule -->
  <line x1="112" y1="314" x2="364" y2="314" stroke="url(#gold)" stroke-width="1" opacity="0.45"/>

  <!-- Tagline -->
  <text x="238" y="338" text-anchor="middle"
    font-family="Georgia,serif" font-size="14" fill="#8899AA" letter-spacing="3.5">
    HIDE IT IN YOUR HEART
  </text>

  <!-- Feature chips -->
  <rect x="108" y="358" width="122" height="26" rx="13" fill="#1A2D44" stroke="#C9922A" stroke-width="1"/>
  <text x="169" y="375" text-anchor="middle" font-family="Georgia" font-size="11" fill="#E8BE60" letter-spacing="1.5">MEMORISE</text>

  <rect x="240" y="358" width="98" height="26" rx="13" fill="#1A2D44" stroke="#C9922A" stroke-width="1"/>
  <text x="289" y="375" text-anchor="middle" font-family="Georgia" font-size="11" fill="#E8BE60" letter-spacing="1.5">QUIZ ME</text>

  <rect x="108" y="393" width="122" height="26" rx="13" fill="#C9922A"/>
  <text x="169" y="410" text-anchor="middle" font-family="Georgia" font-size="11" fill="#FFF8E7" letter-spacing="1.5" font-weight="700">✦ PRAYER</text>

  <rect x="240" y="393" width="98" height="26" rx="13" fill="#1A2D44" stroke="#C9922A" stroke-width="1"/>
  <text x="289" y="410" text-anchor="middle" font-family="Georgia" font-size="11" fill="#E8BE60" letter-spacing="1.5">GIVE ♥</text>

  <!-- Pricing badge -->
  <rect x="108" y="432" width="230" height="44" rx="10" fill="#0A1628" stroke="#E8BE60" stroke-width="1.5"/>
  <text x="223" y="450" text-anchor="middle" font-family="Georgia" font-size="11" fill="#6A8099" letter-spacing="2">FREE TRIAL THEN</text>
  <text x="223" y="468" text-anchor="middle" font-family="Georgia" font-size="16" fill="#E8BE60" font-weight="700" letter-spacing="1">$10.99 LIFETIME</text>

  <!-- Author -->
  <text x="238" y="508" text-anchor="middle"
    font-family="Georgia,serif" font-size="13" fill="#3A5070" letter-spacing="2.5">by MAT JUDAH</text>

  <!-- Bible versions -->
  <text x="238" y="530" text-anchor="middle"
    font-family="Georgia,serif" font-size="11" fill="#2A3F58" letter-spacing="1.5">
    NIV · KJV · ESV · NLT · NKJV · AMP · MSG
  </text>

  <!-- ── VERTICAL DIVIDER ── -->
  <line x1="436" y1="50" x2="436" y2="580" stroke="#1E3050" stroke-width="2"/>
  <circle cx="436" cy="315" r="5" fill="#C9922A" opacity="0.6"/>

  <!-- ── RIGHT PANEL — VERSE CARD MOCKUP ── -->

  <!-- Card glow -->
  <rect x="476" y="90" width="690" height="450" rx="22" fill="#C9922A" opacity="0.06" filter="url(#glow)"/>

  <!-- Card body -->
  <rect x="476" y="90" width="690" height="450" rx="20" fill="url(#cardFill)" filter="url(#shadow)"/>
  <rect x="476" y="90" width="690" height="450" rx="20" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Top accent strip -->
  <rect x="476" y="90" width="690" height="7" rx="4" fill="url(#gold)" opacity="0.7"/>

  <!-- Card reference -->
  <text x="522" y="150"
    font-family="Georgia,serif" font-size="12" fill="#C9922A" letter-spacing="4" font-weight="700">
    PHILIPPIANS 4:13  ·  NIV
  </text>
  <line x1="522" y1="160" x2="760" y2="160" stroke="#C9922A" stroke-width="0.8" opacity="0.4"/>

  <!-- Scripture text -->
  <text x="522" y="207"
    font-family="'Palatino Linotype',Palatino,Georgia,serif"
    font-size="30" font-style="italic" fill="#0F1C2E">"I can do</text>
  <text x="522" y="251"
    font-family="'Palatino Linotype',Palatino,Georgia,serif"
    font-size="30" font-style="italic" fill="#0F1C2E">
    <tspan font-weight="700" fill="#C9922A">all things</tspan>
    <tspan> through</tspan>
  </text>
  <text x="522" y="295"
    font-family="'Palatino Linotype',Palatino,Georgia,serif"
    font-size="30" font-style="italic" fill="#0F1C2E">Christ who</text>
  <text x="522" y="339"
    font-family="'Palatino Linotype',Palatino,Georgia,serif"
    font-size="30" font-style="italic" fill="#0F1C2E">
    <tspan font-weight="700" fill="#C9922A">strengthens</tspan>
    <tspan> me."</tspan>
  </text>

  <!-- Reveal hint -->
  <text x="522" y="374"
    font-family="Georgia,serif" font-size="11" fill="#A09070" letter-spacing="1.5">TAP WORDS TO REVEAL · QUIZ · PRAY</text>

  <!-- Masked word bar mockup -->
  <rect x="522" y="383" width="72" height="13" rx="3" fill="#C9922A" opacity="0.2"/>
  <rect x="604" y="383" width="50" height="13" rx="3" fill="#C9922A" opacity="0.2"/>
  <rect x="664" y="383" width="86" height="13" rx="3" fill="#0F1C2E" opacity="0.7"/>
  <text x="707" y="394" text-anchor="middle" font-family="Georgia" font-size="10" fill="#E8BE60">strengthens</text>

  <!-- Prayer button mock -->
  <rect x="522" y="408" width="205" height="42" rx="10" fill="#0F1C2E"/>
  <text x="624" y="434" text-anchor="middle"
    font-family="Georgia,serif" font-size="13" fill="#E8BE60" font-weight="700" letter-spacing="1">✦ PRAYER POINT</text>

  <!-- Lifetime badge mock -->
  <rect x="737" y="408" width="92" height="42" rx="10" fill="url(#gold)"/>
  <text x="783" y="427" text-anchor="middle" font-family="Georgia" font-size="10" fill="#0F1C2E" font-weight="700">LIFETIME</text>
  <text x="783" y="442" text-anchor="middle" font-family="Georgia" font-size="12" fill="#0F1C2E" font-weight="700">$10.99</text>

  <!-- PayPal note -->
  <text x="522" y="468" font-family="Georgia" font-size="12" fill="#8899AA" letter-spacing="1">💳 PayPal · Ko-fi · Worldwide</text>

  <!-- Bottom bar -->
  <rect x="476" y="527" width="690" height="13" rx="0" fill="#0A1628" opacity="0.3"/>
  <text x="821" y="537" text-anchor="middle" font-family="Georgia" font-size="10" fill="#3A5070" letter-spacing="1.5">8 BIBLE VERSIONS</text>

  <!-- Footer -->
  <text x="600" y="608" text-anchor="middle"
    font-family="Georgia,serif" font-size="12" fill="#1E3050" letter-spacing="2.5">
    BARATI PRIME (PTY) LTD  ·  BOTSWANA
  </text>
</svg>
